import org.aspectj.bridge.MessageHandler
import org.aspectj.tools.ajc.Main

import java.util.zip.ZipEntry
import java.util.zip.ZipFile
import java.util.zip.ZipOutputStream

final def variants = project.android.applicationVariants
variants.all { variant ->
    JavaCompile javaCompile = variant.javaCompile
    javaCompile.doLast {
        String[] args = ["-showWeaveInfo",
                         "-11",
                         "-inpath", javaCompile.destinationDirectory.toString(),
                         "-aspectpath", javaCompile.classpath.asPath,
                         "-d", javaCompile.destinationDirectory.toString(),
                         "-classpath", javaCompile.classpath.asPath,
                         "-bootclasspath", project.android.bootClasspath.join(File.pathSeparator)]
        MessageHandler handler = new MessageHandler(true);
        new Main().run(args, handler);
    }
}
// 主要对resource.arsc进行压缩并打包
// 音频、视频文件压缩后会出现资源加载失败，不能压缩
// res目录中不能压缩的文件类型在noCompressExt中声明，以STORED形式存储；其他类型的文件以DEFLATED格式压缩
def compressRes(originApk, targetApk) {
    def noCompressExt = [".jpg", ".jpeg", ".gif",
                         ".wav", ".mp2", ".mp3", ".ogg", ".aac",
                         ".mpg", ".mpeg", ".mid", ".midi", ".smf", ".jet",
                         ".rtttl", ".imy", ".xmf", ".mp4", ".m4a",
                         ".m4v", ".3gp", ".3gpp", ".3g2", ".3gpp2",
                         ".amr", ".awb", ".wma", ".wmv", ".webm", ".mkv"]
    println "compressRes"
    ZipFile zipFile = new ZipFile(originApk)
    ZipOutputStream zos = new ZipOutputStream(new BufferedOutputStream(new FileOutputStream(targetApk)))
    zipFile.entries().each { entryIn ->
        if (entryIn.directory) {
            println "${entryIn.name} is a directory"
        } else {
            def entryOut = new ZipEntry(entryIn.name)
            def dotPos = entryIn.name.lastIndexOf('.')
            def ext = (dotPos >= 0) ? entryIn.name.substring(dotPos) : ""
            def isRes = entryIn.name.startsWith('res/')
            if (isRes && ext in noCompressExt) {
                entryOut.method = ZipEntry.STORED
                entryOut.size = entryIn.size
                entryOut.compressedSize = entryIn.size
                entryOut.crc = entryIn.crc
            } else {
                entryOut.method = ZipEntry.DEFLATED
            }
            zos.putNextEntry(entryOut)
            zos << zipFile.getInputStream(entryIn)
            zos.closeEntry()
        }
    }
    zos.finish()
    zos.close()
    zipFile.close()
}
// 对不同环境的release包进行压缩
task compressRelease {
    ext.needCompress = ['preinstallv7': 'true', 'preinstallv8': 'true']
    doLast {
        ext.needCompress.eachWithIndex { Map.Entry<String, String> entry, int i ->
            def flavor = entry.key
            def oldApkFile = file("$rootDir/app/build/outputs/apk/$flavor/release/app-$flavor-release-base-master.apk")
            if (oldApkFile.exists() && "true".equals(entry.value)) {
                def newApkFile = new File("$rootDir/app/build/outputs/apk/$flavor/release/app-$flavor-release-compressed.apk")
                // 压缩
                compressRes(oldApkFile.absolutePath, newApkFile.absolutePath)
                // 删除原文件，修改文件名
                oldApkFile.delete()
                newApkFile.renameTo(file("$rootDir/app/build/outputs/apk/$flavor/release/app-$flavor-release-base-master.apk"))
                // 确保每个环境的包只执行一次压缩
                ext.needCompress.put(entry.key, "false")
            }
        }
    }
}
// 在编译任务执行后增加压缩包任务，同时支持流水线和本地打包
project.tasks.whenTaskAdded { Task task ->
    if (task.name.startsWith("DynLangLite") && task.name.endsWith("Release")) {
        // 添加压缩任务
        task.finalizedBy(compressRelease)
    }
    if (task.name.startsWith("DynLangLitehwsign")) {
        // 确保压缩任务在签名前执行
        task.dependsOn(compressRelease)
    }
    // if (task.name.contains("ReleaseApkListingFileRedirect")) { // 过滤release
    //     task.enabled = false
    // }
}

private boolean isTheFlavor(String flavor) {
    getGradle().getStartParameter().getTaskRequests().toString().contains(flavor)
}
