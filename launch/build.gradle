android {
    compileSdkVersion rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    defaultConfig {
        applicationId "com.smart.car.map.ehp"
        manifestPlaceholders = [sharedUserId: ""]
        minSdkVersion rootProject.ext.minSdkVersion
        versionCode = Integer.parseInt(project.findProperty('app_versionCode'))
        versionName = project.findProperty('app_versionName')
        buildConfigField("Integer", "VERSION_CODE", project.findProperty('app_versionCode'))
        buildConfigField("String", "VERSION_NAME", "\"" + project.findProperty('app_versionName') + "\"")
        if (isTheFlavor("Preinstallv7")) {
            ndk {
                abiFilters 'armeabi-v7a'
            }
            targetSdkVersion 29
        } else if (isTheFlavor("Preinstallv8")) {
            ndk {
                abiFilters 'arm64-v8a'
            }
            targetSdkVersion 29
        } else if (isTheFlavor("Common") || isTheFlavor("SmartHY")) {
            println("---isTheFlavor Common ,smartHY use x86")

            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a', "x86", "x86_64"
            }
            targetSdkVersion rootProject.ext.targetSdkVersion
        } else {
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            }
            targetSdkVersion rootProject.ext.targetSdkVersion
        }

        multiDexEnabled true
        vectorDrawables.useSupportLibrary = true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }
    flavorDimensions "mode", "company"

    signingConfigs {
        config {
            storeFile file(RELEASE_KEY_STORE_PATH)
            keyAlias RELEASE_KEY_ALIAS
            keyPassword RELEASE_KEY_PASSWORD
            storePassword RELEASE_STORE_PASSWORD
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.config

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            packagingOptions {
                jniLibs {
                    useLegacyPackaging true
                }
                //CPU架构为 ARMv7 ARMv8
                doNotStrip "*/arm64-v8a/libucs-credential.so"
                doNotStrip "*/armeabi-v7a/libucs-credential.so"
                //CPU架构为 x86
                //doNotStrip "*/x86/libucs-credential.so"
            }
            multiDexKeepProguard file('multidex-config.pro')

            def app_icon = "@drawable/appbg_ld"
            def app_name = "@string/hwmap_ld"

            // smart-hy 和 smart-hx使用定制icon和app_name
            if (isTheFlavor("SmartHY") || isTheFlavor("Smart")) {
                app_icon = "@drawable/appbg_smart"
                app_name = "@string/hwmap_smart"
            }
            manifestPlaceholders = [
                    app_icon: app_icon,
                    app_name: app_name
            ]
        }
        debug {
            signingConfig signingConfigs.config

            def app_icon = "@drawable/appbg_ld"
            def app_name = "@string/hwmap_ld"


            manifestPlaceholders = [
                    app_icon: app_icon,
                    app_name: app_name
            ]

            packagingOptions {
                //CPU架构为 ARMv7 ARMv8
                doNotStrip "*/arm64-v8a/libucs-credential.so"
                doNotStrip "*/armeabi-v7a/libucs-credential.so"
                //CPU架构为 x86
                //doNotStrip "*/x86/libucs-credential.so"
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    dataBinding {
        enabled = true
    }

    dexOptions {
        javaMaxHeapSize "4g"
        preDexLibraries true
        maxProcessCount 8
    }

    // 语言瘦身插件
    aaptOptions {
        additionalParameters "--stable-ids", "${project.rootProject.file('stable-ids.txt').absolutePath}"
    }
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = false
        }
        abi {
            enableSplit = false
        }
    }
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    productFlavors {
        autoproduct {
            // 车机公版
            applicationId "com.smart.car.map.ehp"
            dimension "mode"
            missingDimensionStrategy "mode", "auto"
        }
        common {
            // 车机公版
            dimension "company"
            missingDimensionStrategy "company", "common"
        }

        demo {
            // demo车机版本
            dimension "company"
            missingDimensionStrategy "company", "demo"
        }
    }
    sourceSets {

        autoproduct.assets.srcDirs = ['src/main/assets/auto', 'flavors/autoproduct/assets']
        autoproduct { java.srcDirs = ['src/auto/java', 'flavors/autoproduct/java'] }

    }
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def build = buildType.name
            def version = "${android.defaultConfig.versionName}"
            def createTime = new Date().format("yyyy-MM-dd-kkmmss", TimeZone.getTimeZone("GMT+08:00"))

            // if (build == "release") { // 只处理生产版本
            // def dirName = "launch_${version}_${createTime}"
            // def apkDir = rootProject.file("launch/apk")
            // if (!apkDir.exists()) {
            //     apkDir.mkdirs()
            // }
            // variant.packageApplicationProvider.get().outputDirectory = apkDir  // 指定apk的输出位置

            def apkName = "KikaIsaEhp_${version}_${createTime}_${output.outputFileName}"
            output.outputFileName = apkName  // 指定apk输出文件名
            // }
        }
    }
    // 启用 AIDL 支持
    buildFeatures {
        aidl true
    }
}

