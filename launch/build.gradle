// 编译完成后，删除拷贝过来的agconnect-services.json文件
gradle.addBuildListener(new BuildListener() {

    @Override
    void beforeSettings(Settings settings) {
        super.beforeSettings(settings)
    }

    @Override
    void settingsEvaluated(Settings settings) {
    }

    @Override
    void projectsLoaded(Gradle gradle) {
    }

    @Override
    void projectsEvaluated(Gradle gradle) {

    }

    @Override
    void buildFinished(BuildResult buildResult) {
        println("---BuildListener--buildFinished")
        deleteAgcAndPathIfEmpty('src/autoproduct')
        killJavaProcess()
    }

    private void deleteAgcAndPathIfEmpty(String path) {
        delete(path + "/agconnect-services.json")
        if (file(path) == null || file(path).list() == null) {
            return
        }
        if (file(path).list().length == 0) {
            delete(path)
        }
    }

    private void killJavaProcess() {
        println("---BuildListener--killJavaProcess")
        if (isWindows() && isInstall()) {
            stopJava()
        }
    }

    private boolean isWindows() {
        return org.gradle.internal.os.OperatingSystem.current().isWindows()
    }

    private boolean isInstall() {
        println(getGradle().getStartParameter().getTaskRequests().toString())
        String buildString = getGradle().getStartParameter().getTaskRequests().toString().toLowerCase()
        println("---BuildListener--isInstall" + buildString)
        return buildString.contains("install") || buildString.contains("assemble")
    }

    private void stopJava() {
        println("---stop java.exe")
        String command = "taskkill /f /im java.exe"
        Runtime.getRuntime().exec(command)
    }
})

